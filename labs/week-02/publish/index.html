<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern JavaScript Learning Dashboard</title>
    <script type="module" crossorigin src="/engse203-lab02-68543210001-2/assets/index-yoBeSeBx.js"></script>
    <link rel="stylesheet" crossorigin href="/engse203-lab02-68543210001-2/assets/index-ChRtKQEX.css">
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <p class="eyebrow">ENGSE203</p>
        <h1>Learning Dashboard</h1>
        <p>ติดตามสถานะการเรียนรู้และการส่งงานวิชา Software Engineering</p>
      </header>

      <div id="app-message"></div>

      <section class="controls">
        <label>
          ค้นหาบทเรียน
          <input type="text" id="search" placeholder="พิมพ์คำค้นหาหรือ Tag..." />
        </label>
        <label>
          สถานะ
          <select id="status-filter">
            <option value="all">ทั้งหมด</option>
            <option value="todo">ยังไม่เริ่ม (To do)</option>
            <option value="doing">กำลังทำ (In progress)</option>
            <option value="done">เสร็จแล้ว (Done)</option>
          </select>
        </label>
      </section>

      <section id="stats" class="stats"></section>
      <main id="task-list" class="task-list"></main>
    </div>
  </body>
</html>
