<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENGSE203 LAB 3 — Campus Service Request</title>
  <link rel="stylesheet" href="/src/style.css">
<script type="module" src="/src/main.js"></script>
</head>

<body>

  <header class="hero">
    <div class="container">
      <h1>Campus Service Request</h1>
      <p>LAB 3 . Responsive Web UI + Event + Form</p>
    </div>
  </header>

  <section class="container stats-container" aria-label="Request Summary Statistics">
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Total Requests</span>
        <strong id="stat-total" class="stat-number">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Pending</span>
        <strong id="stat-pending" class="stat-number">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Approved</span>
        <strong id="stat-approved" class="stat-number">0</strong>
      </div>
    </div>
  </section>

  <main class="container page-grid">


    <section class="panel" aria-labelledby="form-title">
      <h2 id="form-title">Create Service Request</h2>
      <form id="request-form" novalidate>


        <div class="field">
          <label for="requester-name">Requester Name</label>
          <input type="text" id="requester-name" name="requester_name" placeholder="Enter your full name"
            aria-describedby="requester_name-error" required />
          <p id="requester_name-error" class="error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="select">Request Type</label>
          <select name="select" id="select" aria-describedby="select-error" required>
            <option value="" disabled selected>-- Please select a request type --</option>
            <option value="Hardware">Hardware / Equipment</option>
            <option value="Software">Software / OS Installation</option>
            <option value="Network">Network / Wi-Fi Troubleshooting</option>
            <option value="General">General Infrastructure Service</option>
          </select>
          <p id="select-error" class="error" aria-live="polite"></p>
        </div>


        <div class="field">
          <label for="details">Details</label>
          <textarea name="details" id="details" placeholder="Enter request details"
            aria-describedby="details-hint details-error" required></textarea>
          <div class="field-meta">
            <small id="details-hint" class="hint">อย่างน้อย 10 ตัวอักษร</small>
            <small id="details-count" class="counter" aria-live="polite">0 ตัวอักษร</small>
          </div>
          <p id="details-error" class="error" aria-live="polite"></p>
        </div>


        <div class="actions">
          <button type="submit">Submit Request</button>
        </div>


        <p id="form-status" class="status" role="status"></p>
      </form>
    </section>


    <aside class="panel preview-panel" aria-labelledby="preview-title">
      <h2 id="preview-title">Live Preview</h2>

      <dl id="preview" aria-live="polite">
        <div>
          <dt>Name</dt>
          <dd id="preview-name">ยังไม่ระบุชื่อ</dd>
        </div>
        <div>
          <dt>Type</dt>
          <dd id="preview-type">ยังไม่เลือกประเภท</dd>
        </div>
        <div>
          <dt>Details</dt>
          <dd id="preview-details">ยังไม่มีรายละเอียด</dd>
        </div>
      </dl>

      <hr class="divider" />
      <div class="request-box">
        <h3>Submitted Requests</h3>
        <ol id="request-list" class="request-list"></ol>
      </div>
    </aside>
  </main>
</body>

</html>
